<main class="min-h-screen justify-center">
    <h1 class="my-10 font-medium text-4xl text-center dark:text-neutral-300">Count lines of code</h1>
    <div class="max-w-[72rem] mx-auto px-2">
        <input id="input" aria-describedby="insert repository url" placeholder="Repository URL" required name="url"
            type="url" pattern="https?://.*" class="truncate text-nowrap rounded-lg border border-neutral-300 focus:outline-none dark:focus:outline-1 focus:ring  dark:bg-zinc-900 dark:border-zinc-500 dark:text-neutral-300 dark:placeholder-neutral-500 placeholder:text-sm block
                w-full py-1.5 px-2.5">
        <span id="check"
            class="invisible fixed top-1/2 right-2 -translate-y-1/2 text-green-500 dark:text-green-500 rounded-md px-1 text-xl">
            <!-- <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                <path
                    d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z" />
            </svg> -->
        </span>

        <p id="hint" class="text-sm pt-1 text-neutral-500 dark:text-neutral-300">For example: <text role="button"
                id="hintUrl" class="underline underline-offset-2 hover:text-neutral-700 dark:hover:text-neutral-300">
                https://github.com/tokio-rs/axum
            </text>
        </p>
        <div id="repoInfo" class="flex space-x-2 items-center invisible">
            <a target="_blank" rel="noopener noreferrer canonical" id="repoUrl" class="link-dark">
                <div id="repoButton"
                    class="whitespace-nowrap inline-flex min-w-12 justify-center rounded-lg border border-neutral-300 items-center px-2 py-1.5 hover:bg-neutral-100 dark:text-neutral-300 dark:border-zinc-500 dark:bg-zinc-900 dark:hover:bg-zinc-800">
                </div>
            </a>
            <div>
                <div id="dropdownButton"
                    class="flex w-28 sm:w-64 truncate border text-neutral-800 border-neutral-300 hover:bg-neutral-100 focus:bg-white rounded-lg text-sm px-2.5 py-2 items-center dark:border-zinc-500 dark:bg-zinc-900 dark:hover:bg-zinc-800"
                    type="button">
                    <div>
                        <svg class="w-6 h-4 dark:text-neutral-300" width="24" height="16"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 21 21" fill="none" stroke="currentColor"
                            stroke-width="1" stroke-linecap="round">
                            <path d="M6 9v6" />
                            <circle cx="18" cy="6" r="2.5" />
                            <circle cx="6" cy="6" r="2.5" />
                            <circle cx="6" cy="18" r="2.5" />
                            <path d="M18 9a9 9 0 0 1-9 9" />
                        </svg>
                    </div>
                    <div id="branchLabel" class="truncate w-28 sm:w-52 text-start px-1 dark:text-neutral-300">dummy
                    </div>
                    <svg class="w-4 h-4 ml-auto dark:text-neutral-300" width="16" height="16" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                        </path>
                    </svg>
                </div>

                <ul id="dropdownList"
                    class="absolute z-10 w-3/4 sm:w-1/12 min-w-64 divide-y bg-white my-1 border border-neutral-300 rounded-lg shadow-lg max-h-72 overflow-auto px-2 py-2 text-sm text-neutral-700 dark:bg-zinc-800 dark:border-zinc-500">
                </ul>
            </div>
            <div class="grow"></div>
            <div id="commit" class="dark:bg-neutral-300 bg-neutral-100"></div>
        </div>

        <div id="invalidFeedback"
            class="flex invisible items-center p-4 mb-4 text-sm text-red-800 border border-red-300 rounded-lg bg-red-50 transform  origin-top transition-transform"
            role="alert">

        </div>
    </div>

    <div class='grid items-center min-w-screen-lg sm:h-auto h-2/3 max-h-screen'>
        <button id="submitButton" type="button" disabled class="h-16 self-end justify-self-center text-white disabled:border-zinc-500 bg-green-700 hover:bg-green-800 disabled:bg-zinc-500 focus:outline-none text-xl  w-1/2 lg:w-1/6 md:w-1/5 font-medium rounded-lg px-5 py-3 my-10 me-2 mb-2 focus:ring-4 
                dark:text-neutral-300 dark:bg-green-800 dark:hover:bg-green-700 focus:ring-green-300">
            <div class="flex justify-center">
                <div class="flex-none hidden" id="checkSpinner" role="status">
                    <img class="inline w-4 h-4 me-3 animate-spin" src="assets/spinner.svg">
                </div>
                <div id="buttonText" class="flex-shrink-0">
                    Count
                </div>
            </div>
        </button>
    </div>
</main>


<statistic class="bg-neutral-100 dark:bg-zinc-900 min-h-svh flex flex-wrap items-center justify-center py-12 gap-12">
</statistic>

<about id="aboutSection"
    class="flex flex-col items-center py-12 px-2 mx-auto max-w-[72rem] dark:text-neutral-300 space-y-8">
</about>
