            <text class="text px-2 dark:text-neutral-200" id="hint">Downloading repository into
                server</text>
            <svg class="w-6 dark:text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>

        </button>

                <div class="truncate text-neutral-700 dark:text-neutral-300" id="enumerating"></div>
                <div class="truncate text-neutral-700 dark:text-neutral-300" id="counting"></div>

                <div class="truncate text-neutral-700 dark:text-neutral-300" id="total"></div>

                aria-valuemax="100" id="pg_counting">
            </div>
            <div class="w-full h-4 flex flex-col justify-center overflow-hidden bg-zinc-900 dark:bg-neutral-300 text-white text-center whitespace-nowrap transition duration-500"
                role="progressbar" aria-label="Segment one" style="width: 0%;" aria-valuenow="10" aria-valuemin="0"
                aria-valuemax="100" id="pg_compressing">
            </div>
            <div class="w-full h-4 flex flex-col justify-center overflow-hidden bg-zinc-900 dark:bg-neutral-300 text-white text-center whitespace-nowrap transition duration-500"

            </div>
            <div class="w-full h-4 flex flex-col justify-center overflow-hidden bg-zinc-900 dark:bg-neutral-300 text-white text-center whitespace-nowrap transition duration-500"

            </div>
            <div class="w-full h-4 rounded-br-lg flex flex-col justify-center overflow-hidden bg-zinc-900 dark:bg-neutral-300 text-white text-center whitespace-nowrap transition duration-500"

                aria-valuemax="100" id="pg_updating">
            </div>
        </div>
