<main class="upload-page my-5">
    <div class="container-md">
        <div class="upload-card" id="t" hidden></div>
        <div id="cocomo" class="upload-card" hidden></div>
        <div class="row">
            <div class="col">
                <div id="area" class="upload-dropzone">
                    <p id="label" class="upload-dropzone-label">Drag one or more files to this drop
                        zone</p>
                    <p id="label2" class="upload-dropzone-label">or click area to browse
                        files</p>
                    <input id="file-input" type="file" multiple name="name" style="display: none;" />
                    <input id="directory-input" type="file" multiple webkitdirectory directory name="directory"
                        style="display: none;" />
                    <div class="upload-picker-actions">
                        <button id="file-picker-button" class="upload-secondary-button" type="button">
                            Choose files
                        </button>
                        <button id="directory-picker-button" class="upload-secondary-button" type="button">
                            Choose folder
                        </button>
                    </div>
                    <div id="items">

                    </div>
                </div>
            </div>
        </div>
        <div class="row text-center">
            <div class="col">
                <div class="container pt-5 justify-content-center">
                    <button class="upload-submit-button" id="submit" type="submit" hidden>
                        Count
                    </button>
                    <div class="upload-processing font-monospace" id="processing" hidden>
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="headingOne">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                    data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                                    <strong id="hint">Upload to server</strong>
                                    <div class="dots">...</div>
                                </button>
                            </h2>

                            <div id="collapseOne" class="accordion-collapse collapse" aria-labelledby="headingOne"
                                data-bs-parent="#processing">

                                <div class="accordion-body text-muted text-start" id="status">
                                </div>
                            </div>
                        </div>

                        <div id="progress" class="upload-progress">
                            <div class="upload-progress-bar" role="progressbar" aria-label="Segment one"
                                id="progress-bar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0"
                                aria-valuemax="100">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
